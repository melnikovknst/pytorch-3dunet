manual_seed: 47

model:
  name: UNet3D
  in_channels: 3
  out_channels: 6
  layer_order: gcr
  f_maps: [32, 64, 128, 256]
  num_groups: 8
  final_sigmoid: false
  is_segmentation: true

trainer:
  checkpoint_dir: outputs/checkpoints_multichannel
  log_dir: outputs/logs/tensorboard_multichannel
  resume: null
  pre_trained: null
  validate_after_iters: 500
  log_after_iters: 100
  max_num_epochs: 50
  max_num_iterations: 100000
  eval_score_higher_is_better: true
  tensorboard_formatter:
    log_channelwise: false

loss:
  name: CrossEntropyLoss
  weight: [1.24, 0.62, 1.66, 0.76, 3.12, 1.34]

optimizer:
  name: Adam
  learning_rate: 0.0002
  weight_decay: 0.00001

eval_metric:
  name: MeanIoU
  skip_background: false

lr_scheduler:
  name: ReduceLROnPlateau
  mode: max
  factor: 0.2
  patience: 8

loaders:
  dataset: LazyHDF5Dataset
  batch_size: 1
  num_workers: 4
  raw_internal_path: raw
  label_internal_path: label
  global_normalization: false

  train:
    file_paths:
      - outputs/h5_axis1_multichannel/parihaka_train.h5
    slice_builder:
      name: SliceBuilder
      patch_shape: [64, 128, 128]
      stride_shape: [48, 96, 96]
    transformer:
      raw:
        - name: ToTensor
          expand_dims: false
      label:
        - name: ToTensor
          expand_dims: false
          dtype: int64

  val:
    file_paths:
      - outputs/h5_axis1_multichannel/parihaka_val.h5
    slice_builder:
      name: SliceBuilder
      patch_shape: [64, 128, 128]
      stride_shape: [48, 96, 96]
    transformer:
      raw:
        - name: ToTensor
          expand_dims: false
      label:
        - name: ToTensor
          expand_dims: false
          dtype: int64
